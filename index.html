<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MeuChat</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--g:#25D366;--gd:#075E54;--gm:#128C7E;--bg:#f0f2f5;--w:#fff;--tx:#111;--mu:#8696a0;}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);display:flex;align-items:center;justify-content:center;min-height:100vh;}

/* LOGIN */
#tela-login{background:#fff;border-radius:24px;padding:44px 36px;width:370px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.13);}
.logo-login{width:72px;height:72px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:34px;box-shadow:0 4px 18px rgba(37,211,102,.4);}
#tela-login h1{font-size:26px;font-weight:700;margin-bottom:6px;}
#tela-login>p{color:var(--mu);font-size:13px;margin-bottom:24px;line-height:1.5;}
.campo{text-align:left;margin-bottom:13px;}
.campo label{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:1px;display:block;margin-bottom:5px;}
.campo input{width:100%;padding:11px 13px;border-radius:11px;border:1.5px solid #e8e8e8;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;}
.campo input:focus{border-color:var(--g);}
.campo-foto{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
.foto-preview{width:52px;height:52px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;flex-shrink:0;border:2px dashed #ccc;font-size:22px;}
.foto-preview img{width:100%;height:100%;object-fit:cover;}
.btn-p{width:100%;padding:12px;border-radius:11px;background:var(--g);color:#fff;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(37,211,102,.35);transition:transform .15s;}
.btn-p:hover{transform:translateY(-1px);}

/* APP */
#app{display:none;width:980px;height:660px;background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.16);}
#app-inner{display:flex;height:100%;}

/* SIDEBAR */
#sidebar{width:310px;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;flex-shrink:0;position:relative;}
#sb-hdr{background:var(--gd);padding:10px 12px;display:flex;align-items:center;justify-content:space-between;}
.hinfo{display:flex;align-items:center;gap:9px;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0;cursor:pointer;overflow:hidden;}
.av img{width:100%;height:100%;object-fit:cover;}
#sb-nome-txt{color:#fff;font-weight:600;font-size:14px;}
.hbtns{display:flex;gap:4px;}
.ibtn{background:rgba(255,255,255,.15);border:none;cursor:pointer;width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0;}
.ibtn:hover{background:rgba(255,255,255,.28);}
#sb-busca-c{padding:7px 10px;background:#f6f6f6;}
#sb-busca{width:100%;padding:8px 12px;border-radius:20px;border:1px solid #e8e8e8;font-size:13px;font-family:inherit;outline:none;background:#fff;}
#online-t{padding:8px 14px 3px;font-size:11px;font-weight:700;color:var(--mu);letter-spacing:1px;}
#lista-on{flex:1;overflow-y:auto;padding:3px 0;}
.uitem{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;border-radius:0;transition:background .15s;}
.uitem:hover{background:#f5f5f5;}
.uitem .av{width:38px;height:38px;font-size:14px;}
.unome{font-size:14px;color:var(--tx);flex:1;}
.pontov{width:8px;height:8px;border-radius:50%;background:var(--g);flex-shrink:0;}

/* MAIN CHAT */
#chat{flex:1;display:flex;flex-direction:column;position:relative;}
#chat-hdr{background:var(--gd);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;}
#chat-hdr-left{display:flex;align-items:center;gap:10px;}
#chat-hdr-av{width:38px;height:38px;font-size:14px;cursor:pointer;}
#chat-title{color:#fff;font-weight:700;font-size:15px;}
#chat-sub{color:rgba(255,255,255,.65);font-size:12px;}
#chat-hdr-btns{display:flex;gap:4px;align-items:center;}
.hbtn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.85);padding:6px;border-radius:50%;display:flex;align-items:center;transition:background .2s;}
.hbtn:hover{background:rgba(255,255,255,.15);}

#status-bar{padding:5px 14px;font-size:12px;font-weight:500;text-align:center;display:none;}
#status-bar.c{background:#fff3cd;color:#856404;display:block;}
#status-bar.e{background:#f8d7da;color:#721c24;display:block;}
#digitando-bar{padding:3px 16px;font-size:12px;color:var(--gm);font-style:italic;min-height:20px;background:#fff;}

#msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:4px;
  background-color:#efeae2;
  background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23000' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");}

/* MENSAGENS */
.mwrap{display:flex;flex-direction:column;position:relative;}
.mwrap.minha{align-items:flex-end;}
.mwrap.deles{align-items:flex-start;}
.mnome{font-size:11px;font-weight:700;margin-bottom:2px;padding:0 4px;}
.mbolha{max-width:67%;padding:7px 11px 4px;border-radius:10px;font-size:14px;line-height:1.5;word-break:break-word;cursor:pointer;position:relative;}
.mwrap.minha .mbolha{background:#dcf8c6;border-radius:10px 10px 2px 10px;}
.mwrap.deles .mbolha{background:#fff;border-radius:10px 10px 10px 2px;box-shadow:0 1px 2px rgba(0,0,0,.07);}
.mhora{font-size:10px;color:var(--mu);text-align:right;margin-top:2px;display:flex;align-items:center;justify-content:flex-end;gap:2px;}
.msistema{text-align:center;font-size:11px;color:var(--mu);background:rgba(255,255,255,.75);border-radius:8px;padding:3px 11px;margin:3px auto;}
.mimg{max-width:220px;max-height:220px;border-radius:7px;display:block;cursor:zoom-in;margin-bottom:2px;}
.maudio{width:200px;margin-bottom:2px;}
.mreply{background:rgba(0,0,0,.07);border-left:3px solid var(--gm);border-radius:5px;padding:4px 8px;margin-bottom:4px;font-size:12px;}
.mreply-nome{font-weight:700;color:var(--gm);margin-bottom:1px;}
.mreply-txt{color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}
.reacoes{display:flex;flex-wrap:wrap;gap:3px;margin-top:2px;}
.reacao-b{background:rgba(255,255,255,.88);border:1px solid #ddd;border-radius:12px;padding:2px 7px;font-size:13px;cursor:pointer;display:flex;align-items:center;gap:2px;transition:background .15s;}
.reacao-b:hover{background:#f0f0f0;}
.reacao-b span{font-size:11px;color:#555;}
.status-c{font-size:12px;}
.status-c.enviado{color:#aaa;}
.status-c.entregue{color:#aaa;}
.status-c.visto{color:#53bdeb;}

/* ENQUETE */
.enquete-card{min-width:200px;}
.enquete-pergunta{font-weight:600;margin-bottom:8px;}
.enquete-opcao{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:8px;background:rgba(0,0,0,.06);margin-bottom:5px;cursor:pointer;transition:background .2s;}
.enquete-opcao:hover{background:rgba(0,0,0,.11);}
.enquete-bar{flex:1;height:4px;border-radius:2px;background:#ccc;overflow:hidden;}
.enquete-bar-fill{height:100%;background:var(--g);transition:width .3s;}
.enquete-pct{font-size:11px;color:var(--mu);min-width:28px;text-align:right;}

/* LOCALIZAÇÃO */
.loc-card{min-width:180px;}
.loc-map{width:100%;height:90px;background:#ddd;border-radius:7px;margin-bottom:4px;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;}

/* CONTATO */
.contato-card{display:flex;align-items:center;gap:10px;padding:4px 0;}
.contato-av{width:38px;height:38px;border-radius:50%;background:var(--gm);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;}

/* REPLY BAR */
#reply-bar{display:none;background:#f0f0f0;border-top:1px solid #ddd;padding:7px 12px;align-items:center;gap:10px;}
#reply-bar.show{display:flex;}
#reply-nome-bar{font-size:12px;font-weight:700;color:var(--gm);}
#reply-txt-bar{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:280px;}
#reply-close-btn{background:none;border:none;cursor:pointer;font-size:17px;color:#888;}

/* INPUT */
#input-area{padding:7px 10px;background:#f0f2f5;display:flex;gap:7px;align-items:center;}
#btn-plus{background:none;border:none;cursor:pointer;padding:7px;border-radius:50%;color:#666;display:flex;transition:background .2s;flex-shrink:0;}
#btn-plus:hover{background:rgba(0,0,0,.07);}
#btn-emoji{background:none;border:none;cursor:pointer;padding:7px;border-radius:50%;color:#666;display:flex;transition:background .2s;flex-shrink:0;}
#btn-emoji:hover{background:rgba(0,0,0,.07);}
#input-msg{flex:1;padding:10px 14px;border-radius:22px;border:none;font-size:14px;font-family:inherit;outline:none;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.08);}
#btn-mic,#btn-send{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
#btn-send{background:var(--g);}#btn-send:hover{background:var(--gm);}
#btn-mic{background:#e0e0e0;}#btn-mic.gravando{background:#f44336;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.55;}}
input[type=file]{display:none;}

/* PLUS MENU */
#plus-menu{position:fixed;background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.17);padding:8px;z-index:9000;display:none;min-width:180px;}
.pm-item{display:flex;align-items:center;gap:11px;width:100%;padding:9px 13px;border:none;background:none;cursor:pointer;font-size:14px;font-family:inherit;color:var(--tx);transition:background .15s;border-radius:8px;text-align:left;}
.pm-item:hover{background:#f5f5f5;}
.pm-ico{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}

/* CONTEXT MENU */
#ctx-menu{position:fixed;background:#fff;border-radius:11px;box-shadow:0 4px 22px rgba(0,0,0,.18);padding:4px 0;z-index:9500;display:none;min-width:170px;overflow:hidden;}
.ctx-i{display:flex;align-items:center;gap:9px;width:100%;padding:9px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-family:inherit;color:var(--tx);transition:background .15s;}
.ctx-i:hover{background:#f5f5f5;}
.ctx-i.danger{color:#e53935;}
.ctx-sep{height:1px;background:#f0f0f0;margin:3px 0;}

/* EMOJI PICKER */
#emoji-picker{position:fixed;background:#fff;border-radius:14px;box-shadow:0 4px 22px rgba(0,0,0,.16);z-index:9600;display:none;width:320px;max-height:340px;flex-direction:column;overflow:hidden;}
#ep-search{padding:8px 12px;border-bottom:1px solid #f0f0f0;}
#ep-search input{width:100%;padding:7px 11px;border:1px solid #e0e0e0;border-radius:20px;font-size:13px;font-family:inherit;outline:none;}
#ep-cats{display:flex;padding:6px 8px;gap:2px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.ecat{background:none;border:none;cursor:pointer;font-size:18px;padding:4px 6px;border-radius:8px;transition:background .15s;}
.ecat:hover,.ecat.on{background:#f0f0f0;}
#ep-grid{display:flex;flex-wrap:wrap;padding:8px;gap:2px;overflow-y:auto;flex:1;}
.ep-btn{background:none;border:none;cursor:pointer;font-size:22px;padding:5px;border-radius:8px;transition:background .15s;}
.ep-btn:hover{background:#f0f0f0;}

/* REACTION EMOJI PICKER */
#react-picker{position:fixed;background:#fff;border-radius:14px;box-shadow:0 4px 18px rgba(0,0,0,.16);padding:8px 10px;z-index:9700;display:none;gap:3px;flex-wrap:nowrap;}
.rp-btn{background:none;border:none;cursor:pointer;font-size:24px;padding:5px;border-radius:8px;transition:all .15s;}
.rp-btn:hover{background:#f0f0f0;transform:scale(1.25);}

/* MODAL GENÉRICO */
#modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:8000;display:none;align-items:center;justify-content:center;}
#modal-ov.on{display:flex;}
#modal{background:#fff;border-radius:18px;padding:28px;width:330px;text-align:center;position:relative;}
#modal h2{font-size:18px;font-weight:700;margin-bottom:6px;}
#modal p{color:var(--mu);font-size:13px;margin-bottom:18px;}
.mcampo{text-align:left;margin-bottom:12px;}
.mcampo label{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:1px;display:block;margin-bottom:4px;}
.mcampo input,.mcampo textarea{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid #e8e8e8;font-size:14px;font-family:inherit;outline:none;resize:vertical;}
.mcampo input:focus,.mcampo textarea:focus{border-color:var(--g);}
.mbtns{display:flex;gap:8px;}
.mbtn-c{flex:1;padding:10px;border-radius:10px;border:1.5px solid #ddd;background:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.mbtn-ok{flex:1;padding:10px;border-radius:10px;border:none;background:var(--g);color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
.mbtn-danger{width:100%;padding:10px;border-radius:10px;border:none;background:#ff4444;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}

/* PAINEL LATERAL (perfil / dados contato) */
#painel-lateral{position:absolute;right:0;top:0;width:300px;height:100%;background:#fff;z-index:7000;display:none;flex-direction:column;border-left:1px solid #f0f0f0;transform:translateX(100%);transition:transform .25s;}
#painel-lateral.on{display:flex;transform:translateX(0);}
#pl-hdr{background:var(--gd);padding:14px 14px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#pl-hdr button{background:none;border:none;cursor:pointer;color:#fff;padding:4px;}
#pl-body{flex:1;overflow-y:auto;padding:0 0 20px;}
#pl-av-grande{width:100px;height:100px;border-radius:50%;margin:-30px auto 12px;display:block;background:#25D366;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:700;color:#fff;overflow:hidden;cursor:pointer;}
#pl-av-grande img{width:100%;height:100%;object-fit:cover;}
#pl-nome{text-align:center;font-size:17px;font-weight:700;padding:0 16px;}
#pl-bio{text-align:center;font-size:13px;color:var(--mu);padding:4px 16px 12px;}
.pl-secao{padding:12px 16px;border-top:1px solid #f5f5f5;}
.pl-secao-title{font-size:11px;font-weight:700;color:var(--g);letter-spacing:1px;margin-bottom:8px;}
.pl-item{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:14px;cursor:pointer;border-radius:8px;transition:background .15s;}
.pl-item:hover{background:#f8f8f8;padding-left:4px;}
.pl-item.danger{color:#e53935;}
.pl-item svg{flex-shrink:0;}

/* GALERIA MÍDIA */
.pl-galeria{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:6px;}
.pl-galeria-img{aspect-ratio:1;object-fit:cover;border-radius:4px;cursor:pointer;width:100%;}

/* CHAMADA */
#chamada-ov{position:fixed;inset:0;background:rgba(7,94,84,.95);z-index:10000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#chamada-ov.on{display:flex;}
#chamada-av{width:90px;height:90px;border-radius:50%;background:var(--g);display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;color:#fff;overflow:hidden;}
#chamada-av img{width:100%;height:100%;object-fit:cover;}
#chamada-nome{color:#fff;font-size:22px;font-weight:700;}
#chamada-status{color:rgba(255,255,255,.7);font-size:14px;}
#videos-area{display:flex;gap:12px;margin-top:10px;}
#video-local,#video-remoto{width:180px;height:135px;background:#000;border-radius:10px;object-fit:cover;}
#chamada-btns{display:flex;gap:16px;margin-top:10px;}
.cbtn{width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .2s;}
.cbtn:hover{transform:scale(1.08);}
#btn-desligar{background:#f44336;}
#btn-mute{background:rgba(255,255,255,.2);}
#btn-cam{background:rgba(255,255,255,.2);}

/* ENQUETE BUILDER */
#enquete-builder{display:none;}
.eq-opcao-row{display:flex;gap:6px;margin-bottom:6px;}
.eq-opcao-inp{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #e0e0e0;font-size:13px;font-family:inherit;outline:none;}
.eq-opcao-inp:focus{border-color:var(--g);}
.eq-rm{background:none;border:none;cursor:pointer;color:#e53935;font-size:18px;padding:0 4px;}

/* LIGHTBOX */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.87);z-index:11000;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox.on{display:flex;}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;}

/* CAMERA MODAL */
#camera-ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:10500;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#camera-ov.on{display:flex;}
#camera-video{width:480px;max-width:90vw;border-radius:10px;background:#000;}
#camera-canvas{display:none;}
.camera-btns{display:flex;gap:12px;}
.cbtn2{padding:10px 22px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit;}

::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-thumb{background:#ccc;border-radius:4px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="tela-login">
  <div class="logo-login">💬</div>
  <h1>MeuChat</h1>
  <p>Entre com seu nome e escolha uma sala para começar</p>
  <div class="campo-foto">
    <div class="foto-preview" id="foto-preview-login" onclick="document.getElementById('foto-login-inp').click()">📷
      <img id="foto-preview-img" src="" style="display:none"/>
    </div>
    <div style="flex:1">
      <div class="campo" style="margin-bottom:0"><label>FOTO DE PERFIL</label></div>
      <span style="font-size:11px;color:var(--mu)">Clique para adicionar</span>
    </div>
  </div>
  <input type="file" id="foto-login-inp" accept="image/*" onchange="previewFotoLogin(this)"/>
  <div class="campo"><label>SEU NOME</label><input id="inp-nome" type="text" placeholder="Como seus amigos vão te ver" maxlength="24"/></div>
  <div class="campo"><label>BIO (opcional)</label><input id="inp-bio" type="text" placeholder="Uma frase sobre você" maxlength="60"/></div>
  <div class="campo"><label>SALA</label><input id="inp-sala" type="text" placeholder="Nome da sala" value="geral" maxlength="24"/></div>
  <button class="btn-p" onclick="entrar()">Entrar no Chat →</button>
  <p style="font-size:11px;color:#bbb;margin-top:12px">Compartilhe o link com seus amigos!</p>
</div>

<!-- APP -->
<div id="app">
 <div id="app-inner">

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sb-hdr">
      <div class="hinfo">
        <div class="av" id="sb-av" style="width:34px;height:34px;background:var(--g);font-size:13px" onclick="abrirMeuPerfil()">?</div>
        <span id="sb-nome-txt">Você</span>
      </div>
      <div class="hbtns">
        <button class="ibtn" onclick="abrirModal('sala')" title="Trocar sala">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 12h18M3 6h18M3 18h12" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="ibtn" onclick="abrirModal('sair')" title="Sair">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H5a2 2 0 01-2-2V7a2 2 0 012-2h6a2 2 0 012 2v1" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function linkify(t){return esc(t).replace(/(https?:\/\/[^\s<>"]+)/g,'<a href="$1" target="_blank" style="color:#0d6efd;text-decoration:underline;word-break:break-all;">$1</a>');}
function horaLocal(){return new Date().toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo",hour:"2-digit",minute:"2-digit"});}
function scroll(){const el=document.getElementById("msgs");el.scrollTop=el.scrollHeight;}
function fecharTudo(){["ctx-menu","plus-menu","react-picker","emoji-picker"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="none";});}

function entrar(){
  const nome=document.getElementById("inp-nome").value.trim();
  const sala=document.getElementById("inp-sala").value.trim()||"geral";
  const bio=document.getElementById("inp-bio").value.trim();
  if(!nome){alert("Digite seu nome!");return;}
  meuNome=nome;minhaSala=sala;meuBio=bio;meuFoto=fotoLoginB64;
  localStorage.setItem("cn",nome);localStorage.setItem("cs",sala);
  localStorage.setItem("cb",bio);localStorage.setItem("cf",fotoLoginB64);
  document.getElementById("tela-login").style.display="none";
  document.getElementById("app").style.display="block";
  atualizarUI();
  pedirNotificacao();
  conectar();
}

  document.getElementById("chat-title").textContent="Sala: "+minhaSala;
  setAv("sb-av",meuNome,meuFoto);
}

window.onload=()=>{

// =================== WEBSOCKET ===================
function conectar(){
  const sb=document.getElementById("status-bar");
  sb.className="c";sb.textContent="Conectando...";sb.style.display="block";
  try{ws=new WebSocket(URL_SERVIDOR);}
  catch(e){sb.className="e";sb.textContent="❌ URL inválida";return;}

  ws.onopen=()=>{
    sb.className="";sb.style.display="none";tentativas=0;
    ws.send(JSON.stringify({tipo:"entrar",nome:meuNome,sala:minhaSala}));
    // Envia perfil
    if(meuFoto||meuBio) ws.send(JSON.stringify({tipo:"perfil",foto:meuFoto,bio:meuBio}));
  };

  ws.onmessage=(ev)=>{
    const m=JSON.parse(ev.data);
    if(m.tipo==="historico") carregarHistorico(m.mensagens);
    else if(m.tipo==="perfis") Object.assign(fotoPerfis,m.perfis);
    else if(m.tipo==="perfil_update"){fotoPerfis[m.nome]={foto:m.foto,bio:m.bio};atualizarOnlineUI();}
    else if(["mensagem","imagem","audio","localizacao","contato","enquete"].includes(m.tipo)) receberMsg(m);
    else if(m.tipo==="sistema") addSistema(m.texto);
    else if(m.tipo==="usuarios_online") atualizarOnline(m.lista);
    else if(m.tipo==="apagar") removerMsg(m.id);
    else if(m.tipo==="reagir") atualizarReacoes(m.id,m.reacoes);
    else if(m.tipo==="votar_update") atualizarVotos(m.id,m.votos);
    else if(m.tipo==="digitando") onDigitando(m.nome);
    else if(m.tipo==="parou") onParou(m.nome);
    else if(m.tipo==="status") atualizarStatus(m.id,m.status);
    else if(m.tipo==="limpar"){todasMensagens=[];document.getElementById("msgs").innerHTML="";}
    else if(m.tipo==="confirmado"){/* ID confirmado */}
    // WebRTC
    else if(m.tipo==="call_offer") receberChamada(m);
    else if(m.tipo==="call_answer") aceitarResposta(m);
    else if(m.tipo==="call_reject") chamadaRejeitada();
    else if(m.tipo==="call_end") encerrarChamada(true);
    else if(m.tipo==="ice_candidate") adicionarIce(m);
  };

  ws.onclose=()=>{
    tentativas++;
    const t=Math.min(3000*tentativas,15000);
    const sb=document.getElementById("status-bar");
    sb.className="c";sb.style.display="block";
    sb.textContent=`⚠️ Reconectando em ${t/1000}s...`;
    setTimeout(conectar,t);
  };
  ws.onerror=()=>{const sb=document.getElementById("status-bar");sb.className="e";sb.style.display="block";sb.textContent="❌ Erro de conexão";};
}

// =================== MENSAGENS ===================
function carregarHistorico(msgs){
  const container=document.getElementById("msgs");
  const existentes=new Set([...container.querySelectorAll("[data-id]")].map(e=>e.dataset.id));
  // Limpa e re-renderiza para evitar duplicatas
  todasMensagens=[];container.innerHTML="";
  msgs.forEach(m=>{
    if(!existentes.has(m.id)||true){// sempre re-renderiza do histórico limpo
      todasMensagens.push({...m,eMinha:m.nome===meuNome});
      container.appendChild(criarBolha(m,m.nome===meuNome));
    }
  });
  scroll();
}

function receberMsg(m){
  // Verifica duplicata (pode vir do histórico E em tempo real)
  if(document.querySelector(`[data-id="${m.id}"]`)) return;
  const eMinha=(m.nome===meuNome);
  todasMensagens.push({...m,eMinha});
  document.getElementById("msgs").appendChild(criarBolha(m,eMinha));
  scroll();
  if(!eMinha){
    notificar(m.nome,m.tipo==="imagem"?"📷 Imagem":m.tipo==="audio"?"🎤 Áudio":m.texto||"");
    unreadIds.push(m.id);
    setTimeout(marcarVisto,1200);
  }
}

function criarBolha(m,eMinha){
  const wrap=document.createElement("div");
  wrap.className="mwrap "+(eMinha?"minha":"deles");
  wrap.dataset.id=m.id;

  if(!eMinha){
    const n=document.createElement("div");n.className="mnome";
    n.textContent=m.nome;n.style.color=cor(m.nome);
    wrap.appendChild(n);
  }

  const bolha=document.createElement("div");bolha.className="mbolha";

  // Reply
  if(m.replyTo){
    const rq=document.createElement("div");rq.className="mreply";
    rq.innerHTML=`<div class="mreply-nome">${esc(m.replyTo.nome)}</div><div class="mreply-txt">${esc(m.replyTo.tipo==="imagem"?"📷 Imagem":m.replyTo.tipo==="audio"?"🎤 Áudio":m.replyTo.texto||"")}</div>`;
    bolha.appendChild(rq);
  }

  // Conteúdo por tipo
  if(m.tipo==="imagem"&&m.media){
    const img=document.createElement("img");img.className="mimg";img.src=m.media;
    img.onclick=e=>{e.stopPropagation();document.getElementById("lightbox-img").src=m.media;document.getElementById("lightbox").classList.add("on");};
    bolha.appendChild(img);
  } else if(m.tipo==="audio"&&m.media){
    const aud=document.createElement("audio");aud.className="maudio";aud.controls=true;aud.src=m.media;bolha.appendChild(aud);
  } else if(m.tipo==="localizacao"&&m.lat){
    const d=document.createElement("div");d.className="loc-card";
    d.innerHTML=`<div class="loc-map" onclick="window.open('https://maps.google.com/?q=${m.lat},${m.lng}','_blank')">📍</div><div style="font-size:12px;color:var(--mu)">📍 ${m.lat.toFixed(4)}, ${m.lng.toFixed(4)}<br><a href="https://maps.google.com/?q=${m.lat},${m.lng}" target="_blank" style="color:#0d6efd;font-size:11px">Abrir no Maps</a></div>`;
    bolha.appendChild(d);
  } else if(m.tipo==="contato"&&m.contatoNome){
    const d=document.createElement("div");d.className="contato-card";
    d.innerHTML=`<div class="contato-av">${ini(m.contatoNome)}</div><div><div style="font-weight:600;font-size:14px">${esc(m.contatoNome)}</div><div style="font-size:12px;color:var(--mu)">Contato</div></div>`;
    bolha.appendChild(d);
  } else if(m.tipo==="enquete"&&m.opcoes){
    const d=document.createElement("div");d.className="enquete-card";
    d.id="eq-"+m.id;
    renderEnquete(d,m,eMinha);
    bolha.appendChild(d);
  } else if(m.semMidia){
    const sp=document.createElement("span");sp.style.cssText="color:#999;font-style:italic";
    sp.textContent=(m.tipo==="imagem"?"📷 Imagem":"🎤 Áudio")+" (offline)";bolha.appendChild(sp);
  }

  if(m.texto&&m.tipo!=="enquete"){
    const sp=document.createElement("span");sp.innerHTML=linkify(m.texto);bolha.appendChild(sp);
  }

  // Hora + status
  const hd=document.createElement("div");hd.className="mhora";hd.innerHTML=m.hora;
  if(eMinha){
    const st=document.createElement("span");st.className="status-c enviado";st.dataset.msgid=m.id;
    const s=msgStatus[m.id];
    if(s==="visto"){st.textContent="✓✓";st.className="status-c visto";}
    else if(s==="entregue"){st.textContent="✓✓";st.className="status-c entregue";}
    else{st.textContent="✓";}
    hd.appendChild(st);
  }
  bolha.appendChild(hd);

  // Reações
  const reac=document.createElement("div");reac.className="reacoes";reac.id="reac-"+m.id;
  if(m.reacoes)atualizarReacoesEl(reac,m.reacoes);
  wrap.appendChild(bolha);wrap.appendChild(reac);

  // Eventos
  bolha.addEventListener("contextmenu",e=>{e.preventDefault();mostrarCtxMenu(e,m.id,eMinha,m);});
  bolha.addEventListener("dblclick",e=>{mostrarCtxMenu(e,m.id,eMinha,m);});

  return wrap;
}

function renderEnquete(el,m,eMinha){
  const votos=m.votos||{};
  const totalVotos=Object.values(votos).reduce((a,v)=>a+(v||[]).length,0);
  let html=`<div class="enquete-pergunta">📊 ${esc(m.texto)}</div>`;
  (m.opcoes||[]).forEach((op,i)=>{
    const v=(votos[i]||[]).length;
    const pct=totalVotos>0?Math.round(v/totalVotos*100):0;
    const meuVoto=(votos[i]||[]).includes(meuNome);
    html+=`<div class="enquete-opcao${meuVoto?" style='border:1.5px solid var(--g)':''}" onclick="votarEnquete('${m.id}',${i})">
      <span style="font-size:13px;flex:none">${esc(op)}</span>
      <div class="enquete-bar"><div class="enquete-bar-fill" style="width:${pct}%"></div></div>
      <span class="enquete-pct">${pct}%</span>
    </div>`;
  });
  html+=`<div style="font-size:11px;color:var(--mu);margin-top:4px">${totalVotos} voto${totalVotos!==1?"s":""}</div>`;
  el.innerHTML=html;
}

function votarEnquete(msgId,opcao){
  if(!ws||ws.readyState!==WebSocket.OPEN)return;
  ws.send(JSON.stringify({tipo:"votar",id:msgId,opcao}));
}

function atualizarVotos(id,votos){
  const m=todasMensagens.find(x=>x.id===id);
  if(m){m.votos=votos;const el=document.getElementById("eq-"+id);if(el)renderEnquete(el,m,m.eMinha);}
}

}

// =================== ARQUIVOS ===================
function comprimir(file,maxKB,cb){
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement("canvas");
      let w=img.width,h=img.height;
      const max=1600;
      if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
      canvas.width=w;canvas.height=h;
      canvas.getContext("2d").drawImage(img,0,0,w,h);
      cb(canvas.toDataURL("image/jpeg",0.82));
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function enviarArquivo(inp,tipo){
  const file=inp.files[0];if(!file)return;
  if(file.size>16*1024*1024){alert("Arquivo grande demais! Máximo 16MB.");inp.value="";return;}
  const reader=new FileReader();
  reader.onload=ev=>{
    const media=ev.target.result;
    if(!ws||ws.readyState!==WebSocket.OPEN)return;
    const id=Date.now().toString();
    msgStatus[id]="enviado";
    const tipoFinal=file.type.startsWith("video/")?"imagem":tipo;
    ws.send(JSON.stringify({tipo:tipoFinal,media,mediaType:file.type,texto:"",replyTo:replyTo||null,clientId:id}));
    const m={id,tipo:tipoFinal,nome:meuNome,media,hora:horaLocal(),replyTo:replyTo||null,reacoes:{}};
    if(!document.querySelector(`[data-id="${id}"]`)){
      todasMensagens.push({...m,eMinha:true});
      document.getElementById("msgs").appendChild(criarBolha(m,true));
      scroll();
    }
    cancelarReply();
  };
  if(tipo==="audio")reader.readAsDataURL(file);
  else comprimir(file,800,b64=>{
    if(!ws||ws.readyState!==WebSocket.OPEN)return;
    const id=Date.now().toString();msgStatus[id]="enviado";
    ws.send(JSON.stringify({tipo:"imagem",media:b64,mediaType:"image/jpeg",texto:"",replyTo:replyTo||null,clientId:id}));
    const m={id,tipo:"imagem",nome:meuNome,media:b64,hora:horaLocal(),replyTo:replyTo||null,reacoes:{}};
    if(!document.querySelector(`[data-id="${id}"]`)){
      todasMensagens.push({...m,eMinha:true});
      document.getElementById("msgs").appendChild(criarBolha(m,true));
      scroll();
    }
    cancelarReply();
  });
  inp.value="";
}

// =================== ÁUDIO ===================
async function toggleGravacao(){
  if(!gravando){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      audioChunks=[];
      mediaRecorder=new MediaRecorder(stream);
      mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
      mediaRecorder.onstop=()=>{
        const blob=new Blob(audioChunks,{type:"audio/webm"});
        stream.getTracks().forEach(t=>t.stop());
        const reader=new FileReader();
        reader.onload=ev=>{
          const media=ev.target.result;
          if(!ws||ws.readyState!==WebSocket.OPEN)return;
          const id=Date.now().toString();msgStatus[id]="enviado";
          ws.send(JSON.stringify({tipo:"audio",media,mediaType:"audio/webm",texto:"",replyTo:replyTo||null,clientId:id}));
          const m={id,tipo:"audio",nome:meuNome,media,hora:horaLocal(),replyTo:replyTo||null,reacoes:{}};
          if(!document.querySelector(`[data-id="${id}"]`)){
            todasMensagens.push({...m,eMinha:true});
            document.getElementById("msgs").appendChild(criarBolha(m,true));
            scroll();
          }
          cancelarReply();
        };
        reader.readAsDataURL(blob);
      };
      mediaRecorder.start();gravando=true;
      document.getElementById("btn-mic").classList.add("gravando");
    }catch(e){alert("Permissão de microfone negada!");}
  } else {
    if(mediaRecorder)mediaRecorder.stop();
    gravando=false;document.getElementById("btn-mic").classList.remove("gravando");
  }
}

// =================== PLUS MENU ===================
function togglePlusMenu(e){
  e.stopPropagation();
  const m=document.getElementById("plus-menu");
  const show=m.style.display!=="block";
  fecharTudo();
  if(show){
    m.style.display="block";
    const r=e.currentTarget.getBoundingClientRect();
    m.style.left=r.left+"px";m.style.top=(r.top-m.offsetHeight-4)+"px";
    // Recalcula após exibir
    setTimeout(()=>{m.style.top=(r.top-m.offsetHeight-4)+"px";},0);
  }
}

function pmAcao(tipo){
  fecharTudo();
  if(tipo==="foto")document.getElementById("file-foto").click();
  else if(tipo==="doc")document.getElementById("file-doc").click();
  else if(tipo==="audio-file")document.getElementById("file-audio").click();
  else if(tipo==="camera")abrirCamera();
  else if(tipo==="localizacao")enviarLocalizacao();
  else if(tipo==="contato")pedirContato();
  else if(tipo==="enquete")abrirEnquete();
}

function enviarLocalizacao(){
  if(!navigator.geolocation){alert("Geolocalização não suportada!");return;}
  navigator.geolocation.getCurrentPosition(pos=>{
    const{latitude:lat,longitude:lng}=pos.coords;
    if(!ws||ws.readyState!==WebSocket.OPEN)return;
    const id=Date.now().toString();
    ws.send(JSON.stringify({tipo:"localizacao",lat,lng,texto:`📍 Localização`,replyTo:replyTo||null,clientId:id}));
    const m={id,tipo:"localizacao",nome:meuNome,lat,lng,texto:"📍 Localização",hora:horaLocal(),replyTo:replyTo||null,reacoes:{}};
    if(!document.querySelector(`[data-id="${id}"]`)){
      todasMensagens.push({...m,eMinha:true});
      document.getElementById("msgs").appendChild(criarBolha(m,true));
      scroll();
    }
    cancelarReply();
  },()=>alert("Não foi possível obter sua localização."));
}

// =================== CÂMERA ===================
async function abrirCamera(){
  try{
    cameraStream=await navigator.mediaDevices.getUserMedia({video:true});
    document.getElementById("camera-video").srcObject=cameraStream;
    document.getElementById("camera-ov").classList.add("on");
  }catch(e){alert("Câmera não disponível!");}
}
function fecharCamera(){
  if(cameraStream)cameraStream.getTracks().forEach(t=>t.stop());
  cameraStream=null;document.getElementById("camera-ov").classList.remove("on");
}
function tirarFoto(){
  const video=document.getElementById("camera-video");
  const canvas=document.getElementById("camera-canvas");
  canvas.width=video.videoWidth;canvas.height=video.videoHeight;
  canvas.getContext("2d").drawImage(video,0,0);
  const b64=canvas.toDataURL("image/jpeg",0.85);
  fecharCamera();
  const id=Date.now().toString();msgStatus[id]="enviado";
  ws.send(JSON.stringify({tipo:"imagem",media:b64,mediaType:"image/jpeg",texto:"",replyTo:replyTo||null,clientId:id}));
  const m={id,tipo:"imagem",nome:meuNome,media:b64,hora:horaLocal(),replyTo:replyTo||null,reacoes:{}};
  if(!document.querySelector(`[data-id="${id}"]`)){
    todasMensagens.push({...m,eMinha:true});
    document.getElementById("msgs").appendChild(criarBolha(m,true));
    scroll();
  }
  cancelarReply();
}

function ctxAcao(acao){
  fecharTudo();
  if(!ctxMsgId)return;
  if(acao==="responder")iniciarReply(ctxMsgId,ctxMsgData);
  else if(acao==="reagir"){
    const m=document.getElementById("ctx-menu");
    const rp=document.getElementById("react-picker");
    rp.style.display="flex";
    rp.style.left=(parseInt(m.style.left)||0)+"px";
    rp.style.top=(parseInt(m.style.top||0)-60)+"px";
    setTimeout(()=>{},0);
    return;
  }
  else if(acao==="reagir-mais"){fecharTudo();toggleEmojiPickerReacao();}
  else if(acao==="copiar"){if(ctxMsgData)navigator.clipboard.writeText(ctxMsgData.texto||"");}
  else if(acao==="encaminhar")encaminhar(ctxMsgData);
  else if(acao==="apagar"){
    if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({tipo:"apagar",id:ctxMsgId}));
    removerMsg(ctxMsgId);
  }
}

const ICE_SERVERS={iceServers:[{urls:"stun:stun.l.google.com:19302"},{urls:"stun:stun1.l.google.com:19302"}]};

async function iniciarChamada(tipo){
  const online=onlineAtual.filter(n=>n!==meuNome);
  if(!online.length){alert("Ninguém online para chamar!");return;}
  if(online.length===1){fazerChamada(online[0],tipo);}
  else{
    abrirModalGenerico("Iniciar Chamada","Escolha quem chamar:",
      `<select id="m-call-sel" style="width:100%;padding:10px;border-radius:10px;border:1.5px solid #ddd;font-size:14px">${online.map(n=>`<option>${n}</option>`).join("")}</select>`,
      ()=>{const nome=document.getElementById("m-call-sel").value;fecharModal();fazerChamada(nome,tipo);}
    );
  }
}

async function fazerChamada(para,tipo){
  tipoCall=tipo;chamandoPara=para;
  mostrarUIchamada(para,"Chamando...",tipo);
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:tipo==="video"});
    if(tipo==="video"){const v=document.getElementById("video-local");v.srcObject=localStream;document.getElementById("videos-area").style.display="flex";}
    peerConn=new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    peerConn.onicecandidate=e=>{if(e.candidate)ws.send(JSON.stringify({tipo:"ice_candidate",to:para,candidate:e.candidate}));};
    peerConn.ontrack=e=>{remoteStream=e.streams[0];document.getElementById("video-remoto").srcObject=remoteStream;};
    const offer=await peerConn.createOffer();
    await peerConn.setLocalDescription(offer);
    ws.send(JSON.stringify({tipo:"call_offer",to:para,offer,video:tipo==="video"}));
  }catch(e){alert("Erro na chamada: "+e.message);encerrarChamada(true);}
}

function receberChamada(m){
  recebendoChamada=m;tipoCall=m.video?"video":"audio";
  mostrarUIchamada(m.from,"Chamada recebida... Aceitar?",tipoCall);
  document.getElementById("chamada-btns").innerHTML=`
    <button class="cbtn" style="background:var(--g);color:#fff" onclick="aceitarChamada()">📞</button>
    <button class="cbtn" id="btn-desligar" onclick="rejeitarChamada()" style="background:#f44336">📵</button>`;
}

async function aceitarChamada(){
  if(!recebendoChamada)return;
  document.getElementById("chamada-status").textContent="Conectando...";
  document.getElementById("chamada-btns").innerHTML=`
    <button class="cbtn" id="btn-mute" onclick="toggleMute()" style="background:rgba(255,255,255,.2);color:#fff">🎤</button>
    <button class="cbtn" id="btn-desligar" onclick="encerrarChamada()" style="background:#f44336">📵</button>`;
  try{
    localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:tipoCall==="video"});
    if(tipoCall==="video"){const v=document.getElementById("video-local");v.srcObject=localStream;document.getElementById("videos-area").style.display="flex";}
    peerConn=new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(t=>peerConn.addTrack(t,localStream));
    peerConn.onicecandidate=e=>{if(e.candidate)ws.send(JSON.stringify({tipo:"ice_candidate",to:recebendoChamada.from,candidate:e.candidate}));};
    peerConn.ontrack=e=>{remoteStream=e.streams[0];document.getElementById("video-remoto").srcObject=remoteStream;};
    await peerConn.setRemoteDescription(recebendoChamada.offer);
    const answer=await peerConn.createAnswer();
    await peerConn.setLocalDescription(answer);
    ws.send(JSON.stringify({tipo:"call_answer",to:recebendoChamada.from,answer}));
    document.getElementById("chamada-status").textContent="Em chamada";
  }catch(e){alert("Erro: "+e.message);encerrarChamada(true);}
}

async function aceitarResposta(m){
  if(!peerConn)return;
  await peerConn.setRemoteDescription(m.answer);
  document.getElementById("chamada-status").textContent="Em chamada";
  document.getElementById("chamada-btns").innerHTML=`
    <button class="cbtn" id="btn-mute" onclick="toggleMute()" style="background:rgba(255,255,255,.2);color:#fff">🎤</button>
    <button class="cbtn" id="btn-desligar" onclick="encerrarChamada()" style="background:#f44336">📵</button>`;
}

async function adicionarIce(m){if(peerConn&&m.candidate)await peerConn.addIceCandidate(m.candidate);}
function rejeitarChamada(){if(recebendoChamada)ws.send(JSON.stringify({tipo:"call_reject",to:recebendoChamada.from}));encerrarChamada(true);}
function chamadaRejeitada(){document.getElementById("chamada-status").textContent="Chamada recusada";setTimeout(()=>encerrarChamada(true),1500);}

function encerrarChamada(silencioso=false){
  if(!silencioso&&chamandoPara&&ws&&ws.readyState===WebSocket.OPEN)
    ws.send(JSON.stringify({tipo:"call_end",to:chamandoPara||(recebendoChamada?.from)}));
  if(peerConn){peerConn.close();peerConn=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  remoteStream=null;recebendoChamada=null;chamandoPara="";
  document.getElementById("chamada-ov").classList.remove("on");
  document.getElementById("videos-area").style.display="none";
  document.getElementById("video-local").srcObject=null;
  document.getElementById("video-remoto").srcObject=null;
  document.getElementById("chamada-btns").innerHTML=`
    <button class="cbtn" id="btn-mute" onclick="toggleMute()" style="color:#fff;background:rgba(255,255,255,.2)">🎤</button>
    <button class="cbtn" id="btn-desligar" onclick="encerrarChamada()" style="background:#f44336">📵</button>`;
}

function mostrarUIchamada(nome,status,tipo){
  const p=fotoPerfis[nome]||{};
  const av=document.getElementById("chamada-av");
  av.style.background=cor(nome);
  if(p.foto){av.innerHTML=`<img src="${p.foto}" style="width:100%;height:100%;object-fit:cover"/>`;}
  else{av.innerHTML=ini(nome);}
  document.getElementById("chamada-nome").textContent=nome;
  document.getElementById("chamada-status").textContent=status;
  if(tipo==="video")document.getElementById("btn-cam").style.display="flex";
  document.getElementById("chamada-ov").classList.add("on");
}

function toggleMute(){
  mutado=!mutado;
  if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=!mutado);
  document.getElementById("btn-mute").textContent=mutado?"🔇":"🎤";
}
function toggleCam(){
  camOff=!camOff;
  if(localStream)localStream.getVideoTracks().forEach(t=>t.enabled=!camOff);
  document.getElementById("btn-cam").textContent=camOff?"📷":"📹";
}

// =================== EVENTOS GLOBAIS ===================
document.addEventListener("click",fecharTudo);
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){fecharTudo();fecharModal();document.getElementById("lightbox").classList.remove("on");fecharCamera();}
});
</script>
